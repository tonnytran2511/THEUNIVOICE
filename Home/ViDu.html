<!DOCTYPE html>
<html>
<head>
<style>
  .container {
    display: flex;
    flex-wrap: wrap; /* Cho phép xuống hàng để thấy align-content */
    width: 400px;
    height: 300px;
    background-color: #f0f0f0;
    border: 2px solid #333;
    margin-bottom: 30px;
  }

  .item {
    width: 100px;
    height: 50px;
    background-color: #ff5722;
    color: white;
    border: 1px solid white;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Trường hợp 1: Chỉ dùng align-items */
  .box-items {
    align-items: center; 
    /* Các item sẽ nằm giữa "dòng" của chính nó */
  }

  /* Trường hợp 2: Dùng align-content */
  .box-content {
    align-content: center;
    /* Cả "khối" các hàng sẽ bị dồn vào giữa hộp cha */
  }
</style>
</head>
<body>

  <h3>1. align-items: center (Căn giữa trong từng hàng)</h3>
  <div class="container box-items">
    <div class="item">1</div>
    <div class="item">2</div>
    <div class="item">3</div>
    <div class="item">4</div>
    <div class="item">5</div>
  </div>

  <h3>2. align-content: center (Căn giữa cả khối hàng)</h3>
  <div class="container box-content">
    <div class="item">1</div>
    <div class="item">2</div>
    <div class="item">3</div>
    <div class="item">4</div>
    <div class="item">5</div>
  </div>

</body>
</html>
